name: Deploy Real Estate API

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy fastapi uvicorn streamlit plotly
    
    - name: Check API can start
      run: |
        timeout 3 uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
        sleep 2
        echo "✅ API started successfully"
    
    - name: Check dashboard can be imported
      run: |
        python -c "import sys; sys.path.insert(0, '.'); from src.visualization.interactive_dashboard import main; print('✅ Dashboard imports OK')"
    
    - name: Deployment check passed
      run: echo "✅ Ready for deployment"
