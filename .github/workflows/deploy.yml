name: Deploy Real Estate API

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy matplotlib seaborn scikit-learn scipy statsmodels fastapi uvicorn streamlit plotly
    
    - name: Verify imports work
      run: |
        python -c "import pandas; import numpy; import matplotlib; import seaborn; print('✅ All imports successful')"
    
    - name: Check API can start
      run: |
        timeout 5 uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
        sleep 3
        echo "✅ API check passed"
    
    - name: Deployment check passed
      run: echo "✅ Ready for deployment"
