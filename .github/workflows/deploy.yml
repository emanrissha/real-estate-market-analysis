name: Deploy Real Estate API

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements/base.txt
        pip install -r requirements/dev.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v
    
    - name: Check API can start
      run: |
        timeout 5 uvicorn src.api.app:app --host 0.0.0.0 --port 8000 &
        sleep 3
        curl -f http://localhost:8000/health || exit 1
