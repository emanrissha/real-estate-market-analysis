name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt && pip install httpx shap

      - name: Run pipeline
        run: python scripts/run_pipeline.py

      - name: Train models
        run: python scripts/train_models.py

      - name: Run tests
        run: pytest tests/ -v