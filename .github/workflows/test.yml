name: Test Real Estate Analysis

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install pandas numpy matplotlib seaborn scikit-learn scipy statsmodels
    
    - name: Verify imports
      run: |
        python -c "
import pandas as pd
import numpy as np
import matplotlib.pyplot as plt
import seaborn as sns
print('✅ All libraries imported successfully')
"
    
    - name: Verify data loading
      run: |
        python -c "
import pandas as pd
df1 = pd.read_csv('data/raw/customers.csv')
df2 = pd.read_csv('data/raw/properties.csv')
print(f'✅ Customers: {df1.shape}')
print(f'✅ Properties: {df2.shape}')
"
    
    - name: All tests passed
      run: echo "✅ All basic tests passed!"
