version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    command: streamlit run src/visualization/interactive_dashboard.py --server.port 8501 --server.address 0.0.0.0

  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    command: jupyter notebook --allow-root --ip=0.0.0.0 --port=8888 --no-browser